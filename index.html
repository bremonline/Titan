      function describeCreatures(creatures) {
        const counts = {};
        creatures.forEach((creature) => {
          counts[creature.type] = (counts[creature.type] || 0) + 1;
        });
        return Object.entries(counts)
          .map(([type, count]) => `${type} x${count}`)
          .join(", ");
      }

      function findLegionInState(legionId) {
        for (const player of gameState?.players || []) {
          const legion = (player.legions || []).find((item) => item.id === legionId);
          if (legion) {
            return legion;
          }
        }
        return null;
      }

      function creatureTileLabel(creature) {
        return `${creature.type} (${creature.power}/${creature.skill})`;
      }

      function splitStackTitle(legion) {
        return `Stack ${getStackNumber(legion)}`;
      }

      function openSplitDialog(gameId, legion) {
        const leftGroup = legion.creatures.map((creature, index) => ({
          id: `L-${index}-${Date.now()}`,
          creature: { ...creature },
        }));
        const rightGroup = [];

        function renderGroupMarkup(group) {
          if (group.length === 0) {
            return `<div class="split-empty">Drop creatures here</div>`;
          }

          return group.map((entry) => `
            <div class="creature-tile" draggable="true" data-creature-id="${entry.id}">
              ${creatureTileLabel(entry.creature)}
            </div>
          `).join("");
        }

        openDialog(`
          <h3>Split ${splitStackTitle(legion)}</h3>
          <div style="font-size:0.78rem;color:#b9a486;">Drag creatures between stacks. Both sides must contain at least one creature.</div>
          <div class="split-dialog-columns">
            <div>
              <p class="split-zone-title">Original Stack (stays at ${legion.tile})</p>
              <div id="split-left-zone" class="split-zone"></div>
            </div>
            <div>
              <p class="split-zone-title">New Stack (also at ${legion.tile})</p>
              <div id="split-right-zone" class="split-zone"></div>
            </div>
          </div>
          <div class="titan-dialog-actions">
            <button id="split-cancel">Cancel</button>
            <button class="primary" id="split-complete">Complete Split</button>
          </div>
        `, (dlg) => {
          const leftZone = dlg.querySelector("#split-left-zone");
          const rightZone = dlg.querySelector("#split-right-zone");

          function rerender() {
            leftZone.innerHTML = renderGroupMarkup(leftGroup);
            rightZone.innerHTML = renderGroupMarkup(rightGroup);
          }

          function moveCreature(creatureId, targetGroup) {
            const fromLeft = leftGroup.findIndex((entry) => entry.id === creatureId);
            if (fromLeft >= 0) {
              const [entry] = leftGroup.splice(fromLeft, 1);
              targetGroup.push(entry);
              return true;
            }

            const fromRight = rightGroup.findIndex((entry) => entry.id === creatureId);
            if (fromRight >= 0) {
              const [entry] = rightGroup.splice(fromRight, 1);
              targetGroup.push(entry);
              return true;
            }

            return false;
          }

          function installZoneHandlers(zone, targetGroup) {
            zone.addEventListener("dragover", (event) => {
              event.preventDefault();
            });

            zone.addEventListener("drop", (event) => {
              event.preventDefault();
              const creatureId = event.dataTransfer?.getData("text/plain") || "";
              if (creatureId && moveCreature(creatureId, targetGroup)) {
                rerender();
              }
            });

            zone.addEventListener("dragstart", (event) => {
              const tile = event.target.closest("[data-creature-id]");
              if (!tile || !event.dataTransfer) {
                return;
              }
              event.dataTransfer.setData("text/plain", tile.getAttribute("data-creature-id") || "");
            });

            zone.addEventListener("click", (event) => {
              const tile = event.target.closest("[data-creature-id]");
              if (!tile) {
                return;
              }

              const creatureId = tile.getAttribute("data-creature-id") || "";
              if (!creatureId) {
                return;
              }

              const destination = targetGroup === leftGroup ? rightGroup : leftGroup;
              if (moveCreature(creatureId, destination)) {
                rerender();
              }
            });
          }

          installZoneHandlers(leftZone, leftGroup);
          installZoneHandlers(rightZone, rightGroup);
          rerender();

          dlg.querySelector("#split-cancel").addEventListener("click", closeDialog);
          dlg.querySelector("#split-complete").addEventListener("click", async () => {
            if (leftGroup.length < 1 || rightGroup.length < 1) {
              showError("Both stacks must contain at least one creature.");
              return;
            }

            const splitCreatures = leftGroup.map((entry) => entry.creature);
            const newCreatures = rightGroup.map((entry) => entry.creature);

            try {
              await client.splitLegion(gameId, legion.id, splitCreatures, newCreatures, legion.tile);
              closeDialog();
              await showSplitPhase(gameId);
            } catch (error) {
              showError(error.message);
            }
          });
        });
      }

      async function splitSelectedLegion(gameId, legionId) {
        const legion = findLegionInState(legionId);
        if (!legion) {
          showError("Could not find the selected legion.");
          return;
        }
        if (legion.creatures.length < 2) {
          showError("This stack needs at least 2 creatures to split.");
          return;
        }

        openSplitDialog(gameId, legion);
      }

      async function showSplitPhase(gameId) {
        setMainBoardMode("world");
        configureAdminPlacementTilePicker(false);
        gameState = await fetchGameState(gameId);
        syncWinnerOverlayFromState(gameState);
        currentPhase = gameState.phase;

        // Safety: if server is still in FIGHT but no contested tile exists, end combat immediately.
        if (currentPhase === "FIGHT" && !findBattleTile(gameState)) {
          const resolverPlayerId = getBattleResolverPlayerId();
          if (resolverPlayerId) {
            try {
              await client.endPhase(activeGameId, resolverPlayerId);
            } catch (_error) {
              // Ignore and fall back to current state render below.
            }
          }
          const refreshedState = await fetchGameState(activeGameId);
          currentPhase = refreshedState.phase;
          gameState = refreshedState;
          if (currentPhase !== "FIGHT") {
            clearBattleTransientState();
            activeTab = "game";
            await showCurrentGame();
            return;
          }
        }

        const players = gameState.players || [];
        const ownPlayer = findOwnPlayer(players);
        setPanelTitle(ownPlayer?.name || "");
        const ownPlayerId = client.getPlayerId();
        const ownPlayers = ownPlayerId ? players.filter((player) => player.id === ownPlayerId) : [];
        const canSpectateAllAiStacks = canViewAllAiStacks(players, ownPlayerId);
        const visiblePlayers = canSpectateAllAiStacks ? players : ownPlayers;
        renderAssignedTowerMarkers(players);
        const playerById = new Map(players.map((player) => [player.id, player]));
        const activePlayer = playerById.get(gameState.activePlayer);
        const isOwnTurn = !!ownPlayerId && gameState.activePlayer === ownPlayerId;

        const legions = visiblePlayers.flatMap((player) =>
          (player.legions || []).map((legion) => ({
            player,
            legion,
          }))
        );

        panelContent.innerHTML = `${renderTabs()}
          <div class="panel-section">
            <h3>Split Phase</h3>
            <div class="status info">
              Active player: <strong>${activePlayer ? activePlayer.name : "Unknown"}</strong><br/>
              ${isOwnTurn ? "It is your turn." : "Waiting for the active player."}
            </div>

            <div class="panel-section" style="margin-top:1rem; padding:0.8rem;">
              <h3 style="margin:0 0 0.6rem;">${canSpectateAllAiStacks ? "All Stacks (AI Spectator)" : "Your Stacks"}</h3>
              ${legions.length === 0 ? `
                <p style="margin:0;color:#9f8b67;">No stacks found.</p>
              ` : legions.map(({ player, legion }) => {
                const canSplit = isOwnTurn && legion.creatures.length > 1;
                return `
                  <div style="border:1px solid #5d4a2e;border-radius:6px;padding:0.65rem;margin-bottom:0.55rem;background:rgba(0,0,0,0.2);">
                    <div style="font-size:0.82rem; color:#d2b88e;"><strong>${player.name}</strong> (${player.color})</div>
                    <div style="font-size:0.8rem; margin-top:0.2rem;">Stack Number: <strong>${getStackNumber(legion)}</strong></div>
                    <div style="font-size:0.8rem; margin-top:0.2rem;">Tile: <strong>${legion.tile}</strong></div>
                    <div style="font-size:0.8rem; margin-top:0.25rem; color:#f0e7cf;">Creatures: ${describeCreatures(legion.creatures)}</div>
                    ${isOwnTurn ? `
                      <div style="margin-top:0.55rem; padding-top:0.55rem; border-top:1px solid #5d4a2e;">
                        ${legion.creatures.length > 1 ? `
                          <div style="font-size:0.78rem; color:#c8b28a;">Split creates two stacks on <strong>${legion.tile}</strong>.</div>
                          <button data-split-legion="${legion.id}" class="primary" style="margin-top:0.5rem; width:100%;">Split Stack</button>
                        ` : `
                          <div style="font-size:0.78rem; color:#9f8b67;">This stack cannot split yet (needs at least 2 creatures).</div>
                        `}
                      </div>
                    ` : ""}
                  </div>
                `;
              }).join("")}
            </div>

            <button id="btn-end-phase" class="primary" style="margin-top:1rem;" ${isOwnTurn ? "" : "disabled"}>End Phase</button>
            ${renderStackPlacementAdminSection(players)}
          </div>
        `;

        bindTabActions();

        document.querySelectorAll("[data-split-legion]").forEach((button) => {

            if (legionId) {
              splitSelectedLegion(gameId, legionId);
            }
          });
        });

        document.getElementById("btn-end-phase")?.addEventListener("click", async () => {
          if (!ownPlayerId) {
            showError("No active player is registered for this client.");
            return;
          }
          try {
            await client.endPhase(gameId, ownPlayerId);
            // State snapshot will handle the view refresh
          } catch (error) {
            showError(error.message);
          }
        });

        bindAdminStackPlacementControls(true);
      }

      async function showMovePhase(gameId) {
        setMainBoardMode("world");
        configureAdminPlacementTilePicker(false);
        gameState = await fetchGameState(gameId);
        syncWinnerOverlayFromState(gameState);
        currentPhase = gameState.phase;

        const players = gameState.players || [];
        const ownPlayer = findOwnPlayer(players);
        setPanelTitle(ownPlayer?.name || "");
        const ownPlayerId = client.getPlayerId();
        const ownPlayers = ownPlayerId ? players.filter((player) => player.id === ownPlayerId) : [];
        const canSpectateAllAiStacks = canViewAllAiStacks(players, ownPlayerId);
        const visiblePlayers = canSpectateAllAiStacks ? players : ownPlayers;
        renderAssignedTowerMarkers(players);
        const playerById = new Map(players.map((player) => [player.id, player]));
        const activePlayer = playerById.get(gameState.activePlayer);
        const isOwnTurn = !!ownPlayerId && gameState.activePlayer === ownPlayerId;
        const movedLegions = new Set(gameState.movedLegionsThisTurn || []);
        let selectedLegionId = null;

        const legions = visiblePlayers.flatMap((player) =>
          (player.legions || []).map((legion) => ({
            player,
            legion,
          }))
        );

        const moveOptionsByLegion = new Map();
        const attackTargetsByLegion = new Map();
        if (isOwnTurn && gameState.dieRoll !== null) {
          const friendlyOccupiedTileIds = new Set(
            (gameState.tiles || [])
              .filter((tile) => (tile.legions || []).some((legion) => legion.playerId === ownPlayerId))
              .map((tile) => tile.id)
          );
          const enemyOccupiedTileIds = new Set(
            (gameState.tiles || [])
              .filter((tile) => (tile.legions || []).some((legion) => legion.playerId !== ownPlayerId))
              .map((tile) => tile.id)
          );

          const candidateLegions = legions.filter(({ player, legion }) =>
            player.id === ownPlayerId && !movedLegions.has(legion.id)
          );

          const optionsEntries = await Promise.all(
            candidateLegions.map(async ({ legion }) => {
              try {
                const response = await fetchValidDestinations(legion.tile, gameState.dieRoll);
                const destinations = Array.isArray(response?.destinations)
                  ? response.destinations
                  : [];
                const boardDestinations = destinations.filter(
                  (tileId) => terrainByNumber.has(tileId) && !friendlyOccupiedTileIds.has(tileId)
                );
                const attackDestinations = boardDestinations.filter((tileId) => enemyOccupiedTileIds.has(tileId));
                return [legion.id, boardDestinations, attackDestinations];
              } catch (error) {
                return [legion.id, [], []];
              }
            })
          );

          optionsEntries.forEach(([legionId, destinations, attackDestinations]) => {
            moveOptionsByLegion.set(legionId, destinations);
            attackTargetsByLegion.set(legionId, new Set(attackDestinations));
          });
        }

        panelContent.innerHTML = `${renderTabs()}
          <div class="panel-section">
            <h3>Move Phase</h3>
            <div class="status info">
              Active player: <strong>${activePlayer ? activePlayer.name : "Unknown"}</strong><br/>
              ${isOwnTurn ? "It is your turn." : "Waiting for the active player."}
            </div>

            <div class="panel-section" style="margin-top:1rem; padding:0.8rem;">
              <h3 style="margin:0 0 0.6rem;">${canSpectateAllAiStacks ? "All Stacks (AI Spectator)" : "Your Stacks"}</h3>
              ${legions.length === 0 ? `
                <p style="margin:0;color:#9f8b67;">No stacks found.</p>
              ` : legions.map(({ player, legion }) => {
                const canMoveThisLegion =
                  isOwnTurn &&
                  gameState.dieRoll !== null &&
                  !movedLegions.has(legion.id);
                const quickTargets = moveOptionsByLegion.get(legion.id) || [];
                const attackTargets = attackTargetsByLegion.get(legion.id) || new Set();

                return `
                  <div data-legion-card="${legion.id}" style="border:1px solid #5d4a2e;border-radius:6px;padding:0.65rem;margin-bottom:0.55rem;background:rgba(0,0,0,0.2);">
                    <div style="font-size:0.82rem; color:#d2b88e;"><strong>${player.name}</strong> (${player.color})</div>
                    <div style="font-size:0.8rem; margin-top:0.2rem;">Stack Number: <strong>${getStackNumber(legion)}</strong></div>
                    <div style="font-size:0.8rem; margin-top:0.2rem;">Tile: <strong>${legion.tile}</strong></div>
                    <div style="font-size:0.8rem; margin-top:0.25rem; color:#f0e7cf;">Creatures: ${describeCreatures(legion.creatures)}</div>
                    ${canMoveThisLegion ? `
                      <button
                        class="secondary"
                        data-select-legion="${legion.id}"
                        style="margin-top:0.55rem; padding:0.3rem 0.55rem; font-size:0.78rem;"
                      >Select stack</button>
                      <div data-move-options-for="${legion.id}" style="display:none; margin-top:0.55rem;">
                        <div style="font-size:0.78rem; color:#c8b28a;">Legal targets for roll ${gameState.dieRoll}: ${quickTargets.length > 0 ? quickTargets.join(", ") : "(none)"}</div>
                        <div style="display:flex; flex-wrap:wrap; gap:0.35rem; margin-top:0.45rem;">
                          ${quickTargets.map((targetTile) => `
                            <button
                              class="secondary ${attackTargets.has(targetTile) ? "move-target-attack" : ""}"
                              data-move-target-legion="${legion.id}"
                              data-move-target-source="${legion.tile}"
                              data-move-target-tile="${targetTile}"
                              style="padding:0.3rem 0.55rem; font-size:0.78rem;"
                            >${attackTargets.has(targetTile) ? `${targetTile}- ATTACK` : targetTile}</button>
                          `).join("")}
                        </div>
                      </div>
                    ` : ""}
                    ${isOwnTurn && movedLegions.has(legion.id) ? `
                      <div style="margin-top:0.4rem; font-size:0.75rem; color:#b9a486;">Already moved this turn.</div>
                    ` : ""}
                  </div>
                `;
              }).join("")}
            </div>

            ${isOwnTurn ? `
              <div style="padding:0.8rem; background:rgba(111, 76, 30, 0.2); border-radius:6px; margin-top:1rem;">
                ${gameState.dieRoll === null ? `
                  <button id="btn-roll-die" class="primary" style="width:100%; margin-bottom:0.5rem;">Roll Die for Movement</button>
                  <p style="margin:0; font-size:0.76rem; color:#b9a486;">Click to roll 1-6 for movement distance.</p>
                ` : `
                  <div class="status success" style="margin-bottom:0.5rem;">
                    <strong>Die Roll: ${gameState.dieRoll}</strong>
                  </div>
                  <p style="margin:0; font-size:0.76rem; color:#b9a486;">You can now move your stacks up to ${gameState.dieRoll} tile(s).</p>
                  ${!gameState.mulligansUsed?.includes(ownPlayerId) ? `
                    <button id="btn-reroll" class="secondary" style="width:100%; margin-top:0.5rem; margin-bottom:0.5rem;">Reroll (1 Mulligan)</button>
                  ` : ""}
                  <button id="btn-end-move" class="primary" style="width:100%; margin-top:0.5rem;">End Move / End Phase</button>
                `}
              </div>
            ` : ""}

            <button id="btn-end-phase-move" class="primary" style="margin-top: 1rem;" ${isOwnTurn ? "display:none;" : ""}>Waiting for Active Player...</button>
            ${renderStackPlacementAdminSection(players)}
          </div>
        `;

        bindTabActions();
        bindAdminStackPlacementControls(false);

        if (isOwnTurn && gameState.dieRoll === null) {
          document.getElementById("btn-roll-die")?.addEventListener("click", async () => {
            try {
              await client.rollForMove(gameId, ownPlayerId);
              await showMovePhase(gameId);
            } catch (error) {
              showError(error.message);
            }
          });
        }

        if (isOwnTurn && gameState.dieRoll !== null) {
          const tileElements = window.titanTriangleElements || new Map();
          const legionById = new Map(
            legions.map(({ legion }) => [legion.id, legion])
          );

          const clearDestinationTargets = () => {
            tileElements.forEach((polygon) => {
              polygon.removeAttribute("data-active-move-target");
              restoreTileHoverText(polygon);
            });
            clearMovePreviewHighlights();
          };

          const setSelectedLegion = (legionId) => {
            if (!moveOptionsByLegion.has(legionId)) {
              return;
            }

            selectedLegionId = legionId;

            document.querySelectorAll("[data-move-options-for]").forEach((options) => {
              const owner = options.getAttribute("data-move-options-for");
              options.style.display = owner === legionId ? "block" : "none";
            });

            document.querySelectorAll("[data-legion-card]").forEach((card) => {
              const owner = card.getAttribute("data-legion-card");
              card.style.borderColor = owner === legionId ? "#caa46a" : "#5d4a2e";
            });

            document.querySelectorAll("[data-select-legion]").forEach((button) => {
              const owner = button.getAttribute("data-select-legion");
              if (owner === legionId) {
                button.classList.remove("secondary");
                button.classList.add("primary");
                button.textContent = "Selected";
              } else {
                button.classList.remove("primary");
                button.classList.add("secondary");
                button.textContent = "Select stack";
              }
            });

            document.querySelectorAll("[data-stack-marker]").forEach((marker) => {
              const owner = marker.getAttribute("data-legion-id");
              marker.style.filter = owner === legionId ? "drop-shadow(0 0 6px rgba(255, 224, 150, 0.95))" : "";
            });

            clearDestinationTargets();

            const selectedLegion = legionById.get(legionId);
            if (!selectedLegion) {
              return;
            }

            const source = tileElements.get(selectedLegion.tile);
            if (source) {
              source.classList.add("triangle-preview-source");
            }

            const legalTargets = moveOptionsByLegion.get(legionId) || [];
            const attackTargets = attackTargetsByLegion.get(legionId) || new Set();
            renderMoveKeyMarkers(legalTargets, attackTargets);
            legalTargets.forEach((tileId) => {
              const target = tileElements.get(tileId);
              if (target) {
                target.classList.add("triangle-preview-target");
                if (attackTargets.has(tileId)) {
                  target.classList.add("triangle-preview-target-attack");
                }
                target.setAttribute("data-active-move-target", "1");
                brightenTileFill(target, 32);
                setTileHoverText(target, buildMoveTargetHoverText(tileId, selectedLegion));
              }
            });

            const help = document.getElementById("move-selection-help");
            if (help) {
              help.textContent = `Selected stack ${getStackNumber(selectedLegion)} at ${selectedLegion.tile}. Click a highlighted destination tile or one of the legal target buttons.`;
            }
          };

          const performMove = async (legionId, targetTile) => {
            const selectedLegion = legionById.get(legionId);
            if (!selectedLegion || !targetTile) {
              return;
            }
            try {
              await client.moveLegion(gameId, legionId, selectedLegion.tile, targetTile);
              await showMovePhase(gameId);
            } catch (error) {
              showError(error.message || "Invalid move");
            }
          };

          document.querySelectorAll("[data-select-legion]").forEach((button) => {
            button.addEventListener("click", () => {
              const legionId = button.getAttribute("data-select-legion");
              if (!legionId) {
                return;
              }
              setSelectedLegion(legionId);
            });
          });

          document
            .querySelectorAll(`[data-stack-marker][data-player-id="${ownPlayerId}"]`)
            .forEach((marker) => {
              marker.style.cursor = "pointer";
              marker.addEventListener("click", () => {
                const legionId = marker.getAttribute("data-legion-id");
                if (!legionId) {
                  return;
                }
                setSelectedLegion(legionId);
              });
            });

          tileElements.forEach((polygon, tileId) => {
            const oldHandler = polygon.__movePhaseClickHandler;
            if (oldHandler) {
              polygon.removeEventListener("click", oldHandler);
            }

            const handler = async () => {
              if (!isOwnTurn || currentPhase !== "MOVE" || !selectedLegionId) {
                return;
              }
              const legalTargets = moveOptionsByLegion.get(selectedLegionId) || [];
              if (!legalTargets.includes(tileId)) {
                return;
              }
              await performMove(selectedLegionId, tileId);
            };

            polygon.addEventListener("click", handler);
            polygon.__movePhaseClickHandler = handler;
          });

          document.querySelectorAll("[data-move-target-legion]").forEach((button) => {
            button.addEventListener("click", async () => {
              const legionId = button.getAttribute("data-move-target-legion");
              const targetTile = button.getAttribute("data-move-target-tile");
              if (!legionId || !targetTile || !ownPlayerId) {
                return;
              }
              if (!selectedLegionId || selectedLegionId !== legionId) {
                showError("Select this stack first, then choose a legal destination.");
                return;
              }

              await performMove(legionId, targetTile);
            });
          });

          const firstMovableLegionId = Array.from(moveOptionsByLegion.keys())[0] || null;
          if (firstMovableLegionId) {
            setSelectedLegion(firstMovableLegionId);
          }

          // Reroll button (mulligan)
          if (!gameState.mulligansUsed?.includes(ownPlayerId)) {
            document.getElementById("btn-reroll")?.addEventListener("click", async () => {
              try {
                await client.rerollDice(gameId, ownPlayerId);
                await showMovePhase(gameId);
              } catch (error) {
                showError(error.message);
              }
            });
          }

          // End move button
          document.getElementById("btn-end-move")?.addEventListener("click", async () => {
            try {
              await client.endPhase(gameId, ownPlayerId);
              // State snapshot will handle the view refresh
            } catch (error) {
              showError(error.message);
            }
          });
        }
      }

      // Returns the first tile that has legions from 2+ different players, or null.
      function findBattleTile(state) {
        if (!state) return null;
        for (const tile of state.tiles || []) {
          const legions = tile.legions || [];
          if (legions.length < 2) continue;
          const playerIds = new Set(legions.map((l) => l.playerId));
          if (playerIds.size >= 2) return tile;
        }
        return null;
      }

      // Renders a classic Titan-style battle board with an irregular hex footprint.
      function renderBattleBoardSvg(terrainType) {
        const HEX_R = BATTLE_HEX_R;
        const HW = BATTLE_HW;
        const PAD_X = 8;
        const PAD_Y = 28;
        const SIDE_GUTTER = 8;

        // Row definitions are [rowIndex, colIndex] on an odd-r offset layout.
        const activeCells = [
          [0, 2], [0, 3], [0, 4],
          [1, 1], [1, 2], [1, 3], [1, 4],
          [2, 1], [2, 2], [2, 3], [2, 4], [2, 5],
          [3, 0], [3, 1], [3, 2], [3, 3], [3, 4], [3, 5],
          [4, 1], [4, 2], [4, 3], [4, 4], [4, 5],
          [5, 1], [5, 2], [5, 3], [5, 4],
        ];

        const toKey = (row, col) => `${row},${col}`;
        const allCellKeys = activeCells.map(([row, col]) => toKey(row, col));

        const templates = {
          PLAINS: {},
          BRUSH: {
            // Bramble tiles: 3, 5, 9, 11, 13, 20, 22, 27
            bramble: ["0,4", "1,2", "2,2", "2,4", "3,0", "4,2", "4,4", "5,4"],
          },
          WOODS: {
            // Tile numbers: 2, 11, 13, 15, 27
            tree: ["0,3", "2,4", "3,0", "3,2", "5,4"],
          },
          JUNGLE: {
            // Tree tiles: 7, 8, 16
            tree: ["1,4", "2,1", "3,3"],
            // Brush tiles: 3, 4, 10, 15, 17, 19, 26
            bramble: ["0,4", "1,1", "2,3", "3,2", "3,4", "4,1", "5,3"],
          },
          MARSH: {
            // Tile numbers: 5, 11, 13, 15, 21, 23
            bog: ["1,2", "2,4", "3,0", "3,2", "4,3", "4,5"],
          },
          SWAMP: {
            // Tree tiles: 6, 9, 21
            tree: ["1,3", "2,2", "4,3"],
            // Bog tiles: 4, 12, 16, 19, 27
            bog: ["1,1", "2,5", "3,3", "4,1", "5,4"],
          },
          TUNDRA: {
            // Tile numbers: 4, 6, 9, 12, 16, 20, 21, 23, 24
            drift: ["1,1", "1,3", "2,2", "2,5", "3,3", "4,2", "4,3", "4,5", "5,1"],
          },
          DESERT: {
            // Tile numbers: 1,2,3,5,6,10,19,20,23,24,27
            dune: ["0,2", "0,3", "0,4", "1,2", "1,3", "2,3", "4,1", "4,2", "4,5", "5,1", "5,4"],
            cliff: ["2,3", "3,1", "5,3"],
          },
          HILLS: {
            // Tree tiles: 9, 12, 21
            tree: ["2,2", "2,5", "4,3"],
            // Dark tall-point tiles: 1, 11, 14, 22, 25
            dark: ["0,2", "2,4", "3,1", "4,4", "5,2"],
          },
          MOUNTAINS: {
            dark: ["3,0", "3,1", "3,2", "4,2", "4,3", "4,4", "5,3"],
            volcano: ["2,3"],
            slope: ["0,3", "1,1", "1,2", "1,4", "2,2", "2,3", "3,1", "3,3", "3,5", "4,1", "5,2"],
            cliff: ["2,3", "4,4"],
          },
          TOWER: {
            inner: ["1,3", "2,2", "2,3", "2,4", "3,2", "3,3", "3,4"],
            wall: ["1,3", "2,2", "2,3", "2,4", "3,2", "3,3", "3,4"],
          },
        };

        const template = templates[terrainType] || templates.PLAINS;
        const darkCells = new Set(template.dark || []);
        const brambleCells = new Set(template.bramble || []);
        const treeCells = new Set(template.tree || []);
        const bogCells = new Set(template.bog || []);
        const driftCells = new Set(template.drift || []);
        const duneCells = new Set(template.dune || []);
        const volcanoCells = new Set(template.volcano || []);
        const innerCells = new Set(template.inner || []);
        const wallCells = new Set(template.wall || []);
        const slopeCells = new Set(template.slope || []);
        const cliffCells = new Set(template.cliff || []);

        const maxCol = Math.max(...activeCells.map(([, col]) => col));
        const maxRow = Math.max(...activeCells.map(([row]) => row));
        const viewW = Math.ceil((maxCol + 1) * HW + HW + PAD_X * 2 + SIDE_GUTTER * 2);
        const viewH = Math.ceil((maxRow + 1) * HEX_R * 1.5 + HEX_R + PAD_Y * 2);

        // Stable labels for communication: top-to-bottom, left-to-right.
        const cellLabelByKey = new Map();
        activeCells.forEach(([row, col], index) => {
          cellLabelByKey.set(`${row},${col}`, String(index + 1));
        });

        const towerCenterKey = Array.from(cellLabelByKey.entries()).find(([, label]) => label === "10")?.[0] || null;
        const towerNearDarkKeys = new Set();
        if (terrainType === "TOWER" && towerCenterKey) {
          const centerByKey = new Map(activeCells.map(([row, col]) => [toKey(row, col), hexCenter(col, row)]));
          const verticesByKey = new Map(
            Array.from(centerByKey.entries()).map(([key, center]) => [key, hexVertices(center.x, center.y)])
          );
          const centerVertices = verticesByKey.get(towerCenterKey);

          if (centerVertices) {
            for (const [otherKey, otherVertices] of verticesByKey.entries()) {
              if (otherKey === towerCenterKey) {
                continue;
              }

              const sharedEdge = getSharedEdge(centerVertices, otherVertices);
              if (sharedEdge) {
                towerNearDarkKeys.add(otherKey);
              }
            }
          }
        }

        const mountainShadeByLabel = new Map();
        ["1", "3", "4", "12", "25"].forEach((label) => mountainShadeByLabel.set(label, "#ececec"));
        ["2", "5", "6", "7", "8", "9", "11", "16", "18", "20", "24", "26"].forEach((label) => mountainShadeByLabel.set(label, "#d9d9d9"));
        ["13", "14", "15", "17", "19", "21", "22", "23", "27"].forEach((label) => mountainShadeByLabel.set(label, "#bcbcbc"));
        mountainShadeByLabel.set("10", "#6c6c6c");

        const mountainToneByLabel = new Map();
        ["10"].forEach((label) => mountainToneByLabel.set(label, 0));
        ["13", "14", "15", "17", "19", "21", "22", "23", "27"].forEach((label) => mountainToneByLabel.set(label, 1));
        ["2", "5", "6", "7", "8", "9", "11", "16", "18", "20", "24", "26"].forEach((label) => mountainToneByLabel.set(label, 2));
        ["1", "3", "4", "12", "25"].forEach((label) => mountainToneByLabel.set(label, 3));

        const terrainFills = {
          PLAINS: "#eadbc1", TUNDRA: "#e2e5e8", MOUNTAINS: "#dbcdc1",
          WOODS: "#dfcfb8", DESERT: "#ecd7b7", MARSH: "#d6dfd6",
          HILLS: "#e2d1b8", SWAMP: "#d4ddd9", TOWER: "#ddd9d1",
          BRUSH: "#e1d8ba", JUNGLE: "#d2ddc9",
        };
        const terrainFill = terrainFills[terrainType] || terrainFills.PLAINS;

        function hexVertices(cx, cy) {
          const pts = [];
          for (let i = 0; i < 6; i++) {
            const a = (Math.PI / 180) * (60 * i - 30);
            pts.push({
              x: cx + HEX_R * Math.cos(a),
              y: cy + HEX_R * Math.sin(a),
            });
          }
          return pts;
        }

        function hexCorners(cx, cy) {
          return hexVertices(cx, cy)
            .map((point) => `${point.x.toFixed(1)},${point.y.toFixed(1)}`)
            .join(" ");
        }

        function vertexKey(point) {
          return `${point.x.toFixed(3)},${point.y.toFixed(3)}`;
        }

        function getSharedEdge(verticesA, verticesB) {
          const verticesAMap = new Map(verticesA.map((point) => [vertexKey(point), point]));
          const shared = verticesB
            .map((point) => verticesAMap.get(vertexKey(point)))
            .filter(Boolean);

          if (shared.length !== 2) {
            return null;
          }

          return shared;
        }

        function renderEdgeTriangles(
          startPoint,
          endPoint,
          towardPoint,
          triangleCount = 7,
          triangleFill = "#808080",
          triangleStroke = "#5c5c5c"
        ) {
          const dx = endPoint.x - startPoint.x;
          const dy = endPoint.y - startPoint.y;
          const length = Math.hypot(dx, dy);
          if (length < 0.001) {
            return "";
          }

          const ux = dx / length;
          const uy = dy / length;
          const n1 = { x: -uy, y: ux };
          const n2 = { x: uy, y: -ux };
          const mid = { x: (startPoint.x + endPoint.x) / 2, y: (startPoint.y + endPoint.y) / 2 };
          const probe1 = { x: mid.x + n1.x * 8, y: mid.y + n1.y * 8 };
          const probe2 = { x: mid.x + n2.x * 8, y: mid.y + n2.y * 8 };
          const d1 = Math.hypot(probe1.x - towardPoint.x, probe1.y - towardPoint.y);
          const d2 = Math.hypot(probe2.x - towardPoint.x, probe2.y - towardPoint.y);
          const normal = d1 < d2 ? n1 : n2;

          let out = "";
          for (let i = 0; i < triangleCount; i += 1) {
            const t0 = i / triangleCount;
            const t1 = (i + 1) / triangleCount;
            const x0 = startPoint.x + dx * t0;
            const y0 = startPoint.y + dy * t0;
            const x1 = startPoint.x + dx * t1;
            const y1 = startPoint.y + dy * t1;
            const baseMidX = (x0 + x1) / 2;
            const baseMidY = (y0 + y1) / 2;
            const apexX = baseMidX + normal.x * 7;
            const apexY = baseMidY + normal.y * 7;

            out += `<polygon points="${x0.toFixed(1)},${y0.toFixed(1)} ${x1.toFixed(1)},${y1.toFixed(1)} ${apexX.toFixed(1)},${apexY.toFixed(1)}" fill="${triangleFill}" stroke="${triangleStroke}" stroke-width="0.7"/>`;
          }

          return out;
        }

        function hexCenter(col, row) {
          return {
            x: SIDE_GUTTER + PAD_X + HW * col + (row % 2 === 1 ? HW / 2 : 0) + HW / 2,
            y: PAD_Y + row * HEX_R * 1.5 + HEX_R,
          };
        }

        let svgContent = `
          <defs>
            <pattern id="battle-bg-grain" patternUnits="userSpaceOnUse" width="10" height="10">
              <rect width="10" height="10" fill="#efe5d0"/>
              <circle cx="2" cy="3" r="0.6" fill="#e3d8bf"/>
              <circle cx="7" cy="8" r="0.6" fill="#e3d8bf"/>
            </pattern>
            <pattern id="tex-bramble" patternUnits="userSpaceOnUse" width="24" height="24">
              <rect width="24" height="24" fill="#f1e7cf"/>
              <path d="M3 6 L10 3 M8 18 L20 6 M2 22 L12 13 M14 20 L22 14 M4 10 L9 17" stroke="#2c2118" stroke-width="1.8" stroke-linecap="round"/>
            </pattern>
            <pattern id="tex-tree" patternUnits="userSpaceOnUse" width="28" height="28">
              <rect width="28" height="28" fill="#f0e6cf"/>
              <circle cx="14" cy="14" r="5.6" fill="#20170f"/>
              <path d="M14 14 L6 5 M14 14 L20 6 M14 14 L23 14 M14 14 L22 22 M14 14 L6 22 M14 14 L5 14 M14 14 L14 4 M14 14 L14 24" stroke="#20170f" stroke-width="2.2" stroke-linecap="round"/>
            </pattern>
            <pattern id="tex-bog" patternUnits="userSpaceOnUse" width="28" height="28">
              <rect width="28" height="28" fill="#ece6d5"/>
              <path d="M0 6 C6 4 10 8 16 6 C22 4 24 7 28 6 M0 16 C7 15 10 17 18 16 C22 15 25 17 28 16" stroke="#3a3126" stroke-width="1" fill="none"/>
              <path d="M6 24 C6 20 7 17 7 13 M10 24 C10 20 11 17 11 12 M8 15 C10 13 12 13 14 15" stroke="#1f1a13" stroke-width="1.2" fill="none"/>
              <path d="M20 11 C20 8 21 5 21 2 M23 11 C23 8 24 5 24 2 M21 5 C22 4 23 4 24 5" stroke="#1f1a13" stroke-width="1.1" fill="none"/>
            </pattern>
            <pattern id="tex-drift" patternUnits="userSpaceOnUse" width="32" height="32">
              <rect width="32" height="32" fill="#eceef0"/>
              <path d="M0 6 C6 2 11 10 17 6 C23 2 27 10 32 6 M0 18 C6 14 10 22 16 18 C23 14 28 22 32 18 M0 28 C7 24 11 32 18 28 C24 24 28 32 32 28" stroke="#4f5861" stroke-width="1.2" fill="none"/>
            </pattern>
            <pattern id="tex-dune" patternUnits="userSpaceOnUse" width="18" height="18">
              <rect width="18" height="18" fill="#e6d2b0"/>
              <circle cx="3" cy="3" r="1" fill="#5e4731"/>
              <circle cx="8" cy="6" r="1" fill="#5e4731"/>
              <circle cx="14" cy="4" r="1" fill="#5e4731"/>
              <circle cx="5" cy="13" r="1" fill="#5e4731"/>
              <circle cx="13" cy="14" r="1" fill="#5e4731"/>
            </pattern>
            <pattern id="tex-dark" patternUnits="userSpaceOnUse" width="6" height="6">
              <rect width="6" height="6" fill="#2f241b"/>
              <circle cx="1" cy="1" r="0.6" fill="#3f3228"/>
              <circle cx="4" cy="3" r="0.6" fill="#3f3228"/>
            </pattern>
            <pattern id="tex-tower-dark" patternUnits="userSpaceOnUse" width="8" height="8">
              <rect width="8" height="8" fill="#8d8d8d"/>
              <circle cx="2" cy="2" r="0.7" fill="#9a9a9a"/>
              <circle cx="6" cy="5" r="0.7" fill="#9a9a9a"/>
            </pattern>
            <pattern id="tex-volcano" patternUnits="userSpaceOnUse" width="28" height="28">
              <rect width="28" height="28" fill="#dfd4c5"/>
              <circle cx="14" cy="14" r="6" fill="#f7efdf" stroke="#3c2b20" stroke-width="1.2"/>
              <path d="M8 13 L11 10 M18 10 L20 13 M14 8 L14 11 M11 18 L14 16 M17 18 L14 16" stroke="#3c2b20" stroke-width="1.1" stroke-linecap="round"/>
            </pattern>
          </defs>
          <rect x="0" y="0" width="${viewW}" height="${viewH}" fill="url(#battle-bg-grain)" rx="10"/>
        `;

        activeCells.forEach(([row, col]) => {
          const { x, y } = hexCenter(col, row);
          const pts = hexCorners(x, y);
          const key = `${row},${col}`;
          const label = cellLabelByKey.get(key) || "";

          let fill = terrainFill;
          if (terrainType === "MOUNTAINS" && label) {
            fill = mountainShadeByLabel.get(label) || "#cfcfcf";
          } else if (terrainType === "TOWER") {
            if (label === "10") {
              fill = "#6f6f6f";
            } else if (towerNearDarkKeys.has(key)) {
              fill = "#a3a3a3";
            } else {
              fill = "#d8d8d8";
            }
          } else if (terrainType === "HILLS") {
            fill = darkCells.has(key) ? "#9a9a9a" : "#d7d7d7";
            if (treeCells.has(key)) fill = "url(#tex-tree)";
          } else {
            if (darkCells.has(key)) fill = terrainType === "TOWER" ? "url(#tex-tower-dark)" : "url(#tex-dark)";
            if (driftCells.has(key)) fill = "url(#tex-drift)";
            if (duneCells.has(key)) fill = "url(#tex-dune)";
            if (bogCells.has(key)) fill = "url(#tex-bog)";
            if (treeCells.has(key)) fill = "url(#tex-tree)";
            if (brambleCells.has(key)) fill = "url(#tex-bramble)";
            if (volcanoCells.has(key)) fill = "url(#tex-volcano)";
          }

          svgContent += `<polygon data-hex="${label}" points="${pts}" fill="${fill}" stroke="#5b3727" stroke-width="2.2"/>`;

          if (slopeCells.has(key) && terrainType !== "MOUNTAINS") {
            const slopeStroke = terrainType === "MOUNTAINS" ? "#8a8a8a" : "#6f5b35";
            svgContent += `<polygon points="${pts}" fill="none" stroke="${slopeStroke}" stroke-width="7" stroke-dasharray="2 7"/>`;
          }
          // Cliff/slope markers are rendered as edge triangles, not dashed outlines.
          if (wallCells.has(key) && terrainType !== "TOWER") {
            svgContent += `<polygon points="${pts}" fill="none" stroke="#efe8db" stroke-width="6" stroke-dasharray="2 8"/>`;
            svgContent += `<polygon points="${pts}" fill="none" stroke="#4f3b2c" stroke-width="2.2"/>`;
          }

          if (label) {
            const labelColor = (terrainType === "TOWER" && (label === "10" || towerNearDarkKeys.has(key))) || volcanoCells.has(key)
              ? "#f2eee6"
              : "#3c2b1f";
            const finalLabelColor = terrainType === "MOUNTAINS" && label === "10" ? "#f2f2f2" : labelColor;
            svgContent += `<text x="${x.toFixed(1)}" y="${(y + 1).toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="${finalLabelColor}" font-weight="600" font-family="Georgia, serif" pointer-events="none">${label}</text>`;
          }
        });

        // For mountains, show slope edges with triangle markers pointing from darker to lighter hexes.
        if (terrainType === "MOUNTAINS") {
          const keyByLabel = new Map(Array.from(cellLabelByKey.entries()).map(([key, label]) => [label, key]));
          const labelByKey = new Map(Array.from(cellLabelByKey.entries()));
          const centerByKey = new Map(activeCells.map(([row, col]) => [toKey(row, col), hexCenter(col, row)]));
          const verticesByKey = new Map(
            Array.from(centerByKey.entries()).map(([key, center]) => [key, hexVertices(center.x, center.y)])
          );
          const slopeEdgeKeys = new Set();
          const noSlopePairs = new Set(["10|5", "10|6", "10|9"]);
          const cliffOnlyPairs = new Set([
            "10|11",
            "10|16",
            "12|17",
            "21|25",
          ]);

          for (const sourceKey of slopeCells.values()) {
            const sourceLabel = labelByKey.get(sourceKey);
            const sourceTone = sourceLabel ? mountainToneByLabel.get(sourceLabel) : undefined;
            const sourceCenter = centerByKey.get(sourceKey);
            const sourceVertices = verticesByKey.get(sourceKey);

            if (sourceTone === undefined || !sourceCenter || !sourceVertices) {
              continue;
            }

            for (const [otherLabel, targetKey] of keyByLabel.entries()) {
              if (sourceKey === targetKey) {
                continue;
              }

              const sourceLabelForEdge = labelByKey.get(sourceKey);
              if (!sourceLabelForEdge) {
                continue;
              }
              const pairKey = [sourceLabelForEdge, otherLabel].sort().join("|");
              if (noSlopePairs.has(pairKey)) {
                continue;
              }
              if (cliffOnlyPairs.has(pairKey)) {
                continue;
              }

              const targetTone = mountainToneByLabel.get(otherLabel);
              if (targetTone === undefined || targetTone === sourceTone) {
                continue;
              }

              const targetCenter = centerByKey.get(targetKey);
              const targetVertices = verticesByKey.get(targetKey);
              if (!targetCenter || !targetVertices) {
                continue;
              }

              const sharedEdge = getSharedEdge(sourceVertices, targetVertices);
              if (!sharedEdge) {
                continue;
              }

              const edgeKey = [
                vertexKey(sharedEdge[0]),
                vertexKey(sharedEdge[1]),
              ].sort().join("|");

              if (slopeEdgeKeys.has(edgeKey)) {
                continue;
              }
              slopeEdgeKeys.add(edgeKey);

              const towardCenter = targetTone > sourceTone ? targetCenter : sourceCenter;
              svgContent += renderEdgeTriangles(sharedEdge[0], sharedEdge[1], towardCenter, 5);
            }
          }

          // Explicit missing slope edges (5 triangles): darker -> lighter.
          const explicitSlopeEdges = [
            ["6", "3"],
            ["13", "8"],
            ["11", "12"],
            ["27", "26"],
            ["22", "26"],
            ["21", "26"],
            ["15", "20"],
          ];

          explicitSlopeEdges.forEach(([fromLabel, toLabel]) => {
            const pairKey = [fromLabel, toLabel].sort().join("|");
            if (noSlopePairs.has(pairKey)) {
              return;
            }

            const fromKey = keyByLabel.get(fromLabel);
            const toCellKey = keyByLabel.get(toLabel);
            if (!fromKey || !toCellKey) {
              return;
            }

            const fromVertices = verticesByKey.get(fromKey);
            const toVertices = verticesByKey.get(toCellKey);
            const toCenter = centerByKey.get(toCellKey);
            if (!fromVertices || !toVertices || !toCenter) {
              return;
            }

            const sharedEdge = getSharedEdge(fromVertices, toVertices);
            if (!sharedEdge) {
              return;
            }

            const edgeKey = [vertexKey(sharedEdge[0]), vertexKey(sharedEdge[1])].sort().join("|");
            if (slopeEdgeKeys.has(edgeKey)) {
              return;
            }
            slopeEdgeKeys.add(edgeKey);

            svgContent += renderEdgeTriangles(sharedEdge[0], sharedEdge[1], toCenter, 5);
          });

          // Special cliff edges (3 triangles): darker -> lighter.
          const explicitCliffEdges = [
            ["10", "5"],
            ["10", "6"],
            ["10", "9"],
            ["10", "11"],
            ["10", "16"],
            ["17", "12"],
            ["21", "25"],
          ];

          explicitCliffEdges.forEach(([fromLabel, toLabel]) => {
            const fromKey = keyByLabel.get(fromLabel);
            const toCellKey = keyByLabel.get(toLabel);
            if (!fromKey || !toCellKey) {
              return;
            }

            const fromVertices = verticesByKey.get(fromKey);
            const toVertices = verticesByKey.get(toCellKey);
            const toCenter = centerByKey.get(toCellKey);
            if (!fromVertices || !toVertices || !toCenter) {
              return;
            }

            const sharedEdge = getSharedEdge(fromVertices, toVertices);
            if (!sharedEdge) {
              return;
            }

            svgContent += renderEdgeTriangles(sharedEdge[0], sharedEdge[1], toCenter, 3, "#555555", "#2f2f2f");
          });
        }

        if (terrainType === "HILLS") {
          const centerByKey = new Map(activeCells.map(([row, col]) => [toKey(row, col), hexCenter(col, row)]));
          const verticesByKey = new Map(
            Array.from(centerByKey.entries()).map(([key, center]) => [key, hexVertices(center.x, center.y)])
          );
          const renderedEdges = new Set();

          for (const darkKey of darkCells.values()) {
            const darkVertices = verticesByKey.get(darkKey);
            if (!darkVertices) {
              continue;
            }

            for (const [otherKey, otherVertices] of verticesByKey.entries()) {
              if (darkKey === otherKey || darkCells.has(otherKey)) {
                continue;
              }

              const sharedEdge = getSharedEdge(darkVertices, otherVertices);
              if (!sharedEdge) {
                continue;
              }

              const edgeKey = [vertexKey(sharedEdge[0]), vertexKey(sharedEdge[1])].sort().join("|");
              if (renderedEdges.has(edgeKey)) {
                continue;
              }
              renderedEdges.add(edgeKey);

              const toCenter = centerByKey.get(otherKey);
              if (!toCenter) {
                continue;
              }

              svgContent += renderEdgeTriangles(sharedEdge[0], sharedEdge[1], toCenter, 5, "#747474", "#505050");
            }
          }
        }

        if (terrainType === "TOWER" && towerCenterKey) {
          const centerByKey = new Map(activeCells.map(([row, col]) => [toKey(row, col), hexCenter(col, row)]));
          const verticesByKey = new Map(
            Array.from(centerByKey.entries()).map(([key, center]) => [key, hexVertices(center.x, center.y)])
          );

          // Build a small adjacency graph so wall triangles can be projected outward by ring.
          const neighborsByKey = new Map(Array.from(verticesByKey.keys()).map((key) => [key, []]));
          const keys = Array.from(verticesByKey.keys());
          for (let i = 0; i < keys.length; i += 1) {
            for (let j = i + 1; j < keys.length; j += 1) {
              const aKey = keys[i];
              const bKey = keys[j];
              const aVertices = verticesByKey.get(aKey);
              const bVertices = verticesByKey.get(bKey);
              if (!aVertices || !bVertices) {
                continue;
              }
              if (getSharedEdge(aVertices, bVertices)) {
                neighborsByKey.get(aKey)?.push(bKey);
                neighborsByKey.get(bKey)?.push(aKey);
              }
            }
          }

          const distanceByKey = new Map([[towerCenterKey, 0]]);
          const queue = [towerCenterKey];
          while (queue.length > 0) {
            const current = queue.shift();
            if (!current) {
              continue;
            }
            const currentDistance = distanceByKey.get(current);
            if (currentDistance === undefined) {
              continue;
            }
            const neighbors = neighborsByKey.get(current) || [];
            neighbors.forEach((nextKey) => {
              if (!distanceByKey.has(nextKey)) {
                distanceByKey.set(nextKey, currentDistance + 1);
                queue.push(nextKey);
              }
            });
          }

          const renderedEdges = new Set();
          for (const [fromKey, fromDistance] of distanceByKey.entries()) {
            if (fromDistance > 1) {
              continue;
            }
            const neighbors = neighborsByKey.get(fromKey) || [];
            neighbors.forEach((toKeyCell) => {
              const toDistance = distanceByKey.get(toKeyCell);
              if (toDistance !== fromDistance + 1) {
                return;
              }

              const fromVertices = verticesByKey.get(fromKey);
              const toVertices = verticesByKey.get(toKeyCell);
              const toCenter = centerByKey.get(toKeyCell);
              if (!fromVertices || !toVertices || !toCenter) {
                return;
              }

              const sharedEdge = getSharedEdge(fromVertices, toVertices);
              if (!sharedEdge) {
                return;
              }

              const edgeKey = [vertexKey(sharedEdge[0]), vertexKey(sharedEdge[1])].sort().join("|");
              if (renderedEdges.has(edgeKey)) {
                return;
              }
              renderedEdges.add(edgeKey);

              svgContent += renderEdgeTriangles(sharedEdge[0], sharedEdge[1], toCenter, 7, "#595959", "#343434");
            });
          }
        }

        if (terrainType === "DESERT") {
          const keyByLabel = new Map(Array.from(cellLabelByKey.entries()).map(([key, label]) => [label, key]));
          const centerByKey = new Map(activeCells.map(([row, col]) => [toKey(row, col), hexCenter(col, row)]));
          const verticesByKey = new Map(
            Array.from(centerByKey.entries()).map(([key, center]) => [key, hexVertices(center.x, center.y)])
          );

          const desertSlopeEdges = [
            ["5", "9"],
            ["10", "9"],
            ["10", "11"],
            ["6", "11"],
            ["6", "7"],
            ["19", "13"],
            ["19", "14"],
            ["20", "14"],
            ["20", "21"],
            ["20", "25"],
            ["27", "26"],
            ["27", "22"],
            ["23", "22"],
            ["23", "18"],
          ];

          desertSlopeEdges.forEach(([fromLabel, toLabel]) => {
            const fromKey = keyByLabel.get(fromLabel);
            const toKeyCell = keyByLabel.get(toLabel);
            if (!fromKey || !toKeyCell) {
              return;
            }

            const fromVertices = verticesByKey.get(fromKey);
            const toVertices = verticesByKey.get(toKeyCell);
            const toCenter = centerByKey.get(toKeyCell);
            if (!fromVertices || !toVertices || !toCenter) {
              return;
            }

            const sharedEdge = getSharedEdge(fromVertices, toVertices);
            if (!sharedEdge) {
              return;
            }

            svgContent += renderEdgeTriangles(sharedEdge[0], sharedEdge[1], toCenter, 5, "#6a5a44", "#4d3f2d");
          });

          const desertCliffEdges = [
            ["10", "15"],
            ["10", "16"],
            ["20", "15"],
            ["23", "17"],
          ];

          desertCliffEdges.forEach(([fromLabel, toLabel]) => {
            const fromKey = keyByLabel.get(fromLabel);
            const toKeyCell = keyByLabel.get(toLabel);
            if (!fromKey || !toKeyCell) {
              return;
            }

            const fromVertices = verticesByKey.get(fromKey);
            const toVertices = verticesByKey.get(toKeyCell);
            const toCenter = centerByKey.get(toKeyCell);
            if (!fromVertices || !toVertices || !toCenter) {
              return;
            }

            const sharedEdge = getSharedEdge(fromVertices, toVertices);
            if (!sharedEdge) {
              return;
            }

            svgContent += renderEdgeTriangles(sharedEdge[0], sharedEdge[1], toCenter, 3, "#4f4232", "#2f261d");
          });
        }

        // Entry side markers.
        // Attacker enters from the 4-hex bottom row (row 5); defender from the 3-hex top row (row 0).
        const entryArrowHW = HEX_R * 0.3;   // half-width of arrow base
        const entryArrowH  = HEX_R * 0.3;   // height of arrow
        const entryGap     = 4;              // gap from hex vertex to arrow tip

        // Attacker (bottom row 5) — blue upward-pointing arrows (tip toward board)
        activeCells.filter(([row]) => row === 5).forEach(([row, col]) => {
          const { x: cx, y: cy } = hexCenter(col, row);
          const tipY  = cy + HEX_R + entryGap;
          const baseY = tipY + entryArrowH;
          svgContent += `<polygon points="${cx.toFixed(1)},${tipY.toFixed(1)} ${(cx - entryArrowHW).toFixed(1)},${baseY.toFixed(1)} ${(cx + entryArrowHW).toFixed(1)},${baseY.toFixed(1)}" fill="#1e50b8" fill-opacity="0.8" stroke="#0e2f7a" stroke-width="0.8"/>`;
        });
        {
          const atkHexes = activeCells.filter(([row]) => row === 5);
          const xs = atkHexes.map(([r, c]) => hexCenter(c, r).x);
          const midX = (Math.min(...xs) + Math.max(...xs)) / 2;
          const bottomCenter = hexCenter(atkHexes[0][1], 5);
          const labelY = bottomCenter.y + HEX_R + entryGap + entryArrowH + 9;
          svgContent += `<text x="${midX.toFixed(1)}" y="${labelY.toFixed(1)}" text-anchor="middle" font-size="9" fill="#1e50b8" font-weight="700" font-family="Georgia,serif" letter-spacing="0.06em">ATTACKER</text>`;
        }

        // Defender (top row 0) — red downward-pointing arrows (tip toward board)
        activeCells.filter(([row]) => row === 0).forEach(([row, col]) => {
          const { x: cx, y: cy } = hexCenter(col, row);
          const tipY  = cy - HEX_R - entryGap;
          const baseY = tipY - entryArrowH;
          svgContent += `<polygon points="${cx.toFixed(1)},${tipY.toFixed(1)} ${(cx - entryArrowHW).toFixed(1)},${baseY.toFixed(1)} ${(cx + entryArrowHW).toFixed(1)},${baseY.toFixed(1)}" fill="#b01818" fill-opacity="0.8" stroke="#7a0e0e" stroke-width="0.8"/>`;
        });
        {
          const defHexes = activeCells.filter(([row]) => row === 0);
          const xs = defHexes.map(([r, c]) => hexCenter(c, r).x);
          const midX = (Math.min(...xs) + Math.max(...xs)) / 2;
          const topCenter = hexCenter(defHexes[0][1], 0);
          const labelY = topCenter.y - HEX_R - entryGap - entryArrowH - 4;
          svgContent += `<text x="${midX.toFixed(1)}" y="${labelY.toFixed(1)}" text-anchor="middle" font-size="9" fill="#b01818" font-weight="700" font-family="Georgia,serif" letter-spacing="0.06em">DEFENDER</text>`;
        }

        return `<svg viewBox="0 0 ${viewW} ${viewH}" style="width:100%;height:auto;display:block;border-radius:8px;" role="img" aria-label="Titan battle board">${svgContent}</svg>`;
      }

      let battlePreviewTerrain = "PLAINS";
      const BATTLE_TERRAINS = ["PLAINS","TUNDRA","MOUNTAINS","WOODS","DESERT","MARSH","HILLS","SWAMP","TOWER","BRUSH","JUNGLE"];

      async function showBattleBoard() {
        activeTab = "battle";
        configureAdminPlacementTilePicker(false);
        // Allow standalone preview with no active game (e.g. ?battle=MOUNTAINS).
        const standalonePreview = !activeGameId;
        if (standalonePreview) {
          battleResolutionContext = {
            tileId: "",
            defenderLegionId: "",
            attackerLegionId: "",
            defenderPlayerId: "",
            attackerPlayerId: "",
          };
          const terrain = battlePreviewTerrain;
          const terrainLabel = terrain.charAt(0) + terrain.slice(1).toLowerCase();
          ensureBattleInfoContext(terrain, "preview");
          setMainBoardMode("battle", { terrain, meta: `Preview mode · Terrain ${terrainLabel}` });
          panelContent.innerHTML = `${renderTabs()}
            <div class="panel-section">
              <h3>Battle — ${terrainLabel}</h3>
              <div class="status info" style="margin-bottom:0.8rem;">Preview — no active combat. Select terrain:</div>
              <div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.8rem;">
                ${BATTLE_TERRAINS.map((t) => `<button class="battle-terrain-pick" data-terrain="${t}" style="padding:0.25rem 0.5rem;font-size:0.72rem;background:${t===terrain?"#7a2828":"rgba(80,20,20,0.35)"};border:1px solid ${t===terrain?"#ff6a6a":"#7a3a3a"};border-radius:3px;color:${t===terrain?"#ffe8e8":"#e8a0a0"};cursor:pointer;">${t.charAt(0)+t.slice(1).toLowerCase()}</button>`).join("")}
              </div>
              <div id="battle-roll-host" style="margin-top:0.7rem;"></div>
              <div id="battle-strike-roster-host" style="margin-top:0.7rem;"></div>
            </div>`;
          bindTabActions();
          ensureBattleRollPanel();
          renderBattleRollRows();
          ensureBattleStrikeRosterPanel();
          refreshBattleStrikeRoster();
          document.querySelectorAll(".battle-terrain-pick").forEach((btn) => {
            btn.addEventListener("click", () => {
              battlePreviewTerrain = btn.getAttribute("data-terrain") || "PLAINS";
              showBattleBoard();
            });
          });
          return;
        }

        gameState = await fetchGameState(activeGameId);
        syncWinnerOverlayFromState(gameState);
        currentPhase = gameState.phase;

        const players = gameState.players || [];
        const ownPlayer = findOwnPlayer(players);
        const ownPlayerId = client.getPlayerId();
        setPanelTitle(ownPlayer?.name || "");
        renderAssignedTowerMarkers(players);

        const isPreview = currentPhase !== "FIGHT";
        const battleTile = isPreview ? null : findBattleTile(gameState);
        const terrain = isPreview ? battlePreviewTerrain : (battleTile?.terrainType || "PLAINS").toUpperCase();
        const tileId = battleTile?.id || null;

        const battleLegions = battleTile?.legions || [];
        const playerById = new Map(players.map((p) => [p.id, p]));
        const legionsByPlayer = new Map();
        battleLegions.forEach((legion) => {
          const arr = legionsByPlayer.get(legion.playerId) || [];
          arr.push(legion);
          legionsByPlayer.set(legion.playerId, arr);
        });

        // Keep role mapping deterministic so resolveBattle always receives correct legion ids.
        const uniqueBattlePlayerIds = Array.from(legionsByPlayer.keys()).slice(0, 2);
        const attackerPlayerId =
          (gameState.activePlayer && legionsByPlayer.has(gameState.activePlayer)
            ? gameState.activePlayer
            : uniqueBattlePlayerIds[0]) || "";
        const defenderPlayerId = uniqueBattlePlayerIds.find((id) => id !== attackerPlayerId) || "";

        const attackerLegion = attackerPlayerId ? (legionsByPlayer.get(attackerPlayerId)?.[0] || null) : null;
        const defenderLegion = defenderPlayerId ? (legionsByPlayer.get(defenderPlayerId)?.[0] || null) : null;
        const roleEntries = [
          [defenderPlayerId, defenderPlayerId ? (legionsByPlayer.get(defenderPlayerId) || []) : []],
          [attackerPlayerId, attackerPlayerId ? (legionsByPlayer.get(attackerPlayerId) || []) : []],
        ].filter(([pid, legions]) => !!pid && legions.length > 0);

        battleResolutionContext = {
          tileId: tileId || "",
          defenderLegionId: defenderLegion?.id || "",
          attackerLegionId: attackerLegion?.id || "",
          defenderPlayerId: defenderLegion?.playerId || "",
          attackerPlayerId: attackerLegion?.playerId || "",
        };

        const isOwnTurn = !!ownPlayerId && gameState.activePlayer === ownPlayerId;
        const terrainLabel = terrain.charAt(0) + terrain.slice(1).toLowerCase();
        const battleMeta = isPreview
          ? `Preview mode · Terrain ${terrainLabel}`
          : `${terrainLabel}${tileId ? ` · Tile ${tileId}` : ""}`;

        ensureBattleInfoContext(terrain, tileId || "preview");

        setMainBoardMode("battle", {
          terrain,
          meta: battleMeta,
        });

        panelContent.innerHTML = `${renderTabs()}
          <div class="panel-section">
            <h3>Battle — ${terrainLabel}${tileId ? ` · Tile ${tileId}` : ""}</h3>
            ${isPreview ? `
              <div class="status info" style="margin-bottom:0.8rem;">Preview — no active combat. Select terrain:</div>
              <div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.8rem;">
                ${BATTLE_TERRAINS.map((t) => `<button class="battle-terrain-pick" data-terrain="${t}" style="padding:0.25rem 0.5rem;font-size:0.72rem;background:${t===terrain?"#7a2828":"rgba(80,20,20,0.35)"};border:1px solid ${t===terrain?"#ff6a6a":"#7a3a3a"};border-radius:3px;color:${t===terrain?"#ffe8e8":"#e8a0a0"};cursor:pointer;">${t.charAt(0)+t.slice(1).toLowerCase()}</button>`).join("")}
              </div>
            ` : (battleTile && roleEntries.length >= 2 ? `
              <div style="margin-bottom:0.8rem;">
                ${roleEntries.map(([pid, legions], i) => {
                  const player = playerById.get(pid);
                  const total = legions.reduce((s, l) => s + (l.creatures || []).length, 0);
                  const role = i === 0 ? "Defender" : "Attacker";
                  return `<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem;">
                    <span style="width:10px;height:10px;border-radius:2px;background:${player?.color || "#888"};display:inline-block;flex-shrink:0;"></span>
                    <span style="font-size:0.8rem;color:#d2b88e;">${player?.name || pid}</span>
                    <span style="font-size:0.75rem;color:#9f8b67;">${role} · ${total} creature${total !== 1 ? "s" : ""}</span>
                  </div>`;
                }).join("")}
              </div>
            ` : `<div class="status info" style="margin-bottom:0.8rem;">Resolving combat…</div>`)}
            <div id="battle-roll-host" style="margin-top:0.7rem;"></div>
            <div id="battle-strike-roster-host" style="margin-top:0.7rem;"></div>
            ${renderBattleBoardSvg(terrain)}
          </div>
          ${isPreview ? renderForceBattleAdminSection(players) : ""}
          ${!isPreview ? `<div class="panel-section" style="margin-top:1rem;">
            <button id="btn-end-combat" class="primary" style="width:100%;" ${isOwnTurn ? "" : "disabled"}>End Combat Phase</button>
          </div>` : ""}
        `;

        bindTabActions();
        ensureBattleRollPanel();
        renderBattleRollRows();
        ensureBattleStrikeRosterPanel();
        refreshBattleStrikeRoster();

        if (!isPreview && roleEntries.length >= 2 && !testStacksActive) {
          const stacks = roleEntries.map(([pid, legions], i) => {
            const legion = legions[0];
            const player = playerById.get(pid);
            return {
              role: i === 0 ? "defender" : "attacker",
              player: player?.name || pid,
              color: player?.color || "#777777",
              legionId: legion?.id || "",
              playerId: pid,
              tileId: tileId || "",
              creatures: (legion?.creatures || []).map((creature) => ({
                name: creature.type,
                power: creature.power,
                skill: creature.skill,
                color: creature.color,
              })),
            };
          });
          applyBattleStacks(stacks);
            scheduleBattleAiAutomation();
        }

        document.querySelectorAll(".battle-terrain-pick").forEach((btn) => {
          btn.addEventListener("click", () => {
            battlePreviewTerrain = btn.getAttribute("data-terrain") || "PLAINS";
            showBattleBoard();
          });
        });

        document.getElementById("btn-force-battle")?.addEventListener("click", forceBattleForTest);

        document.getElementById("btn-end-combat")?.addEventListener("click", async () => {
          if (!ownPlayerId) { showError("No active player is registered for this client."); return; }
          try {
            await client.endPhase(activeGameId, ownPlayerId);
          } catch (error) {
            showError(error.message);
          }
        });
      }

      async function showCombatPhase(gameId) {
        activeTab = "battle";
        await showBattleBoard();
      }

      async function showRecruitPhase(gameId) {
        setMainBoardMode("world");
        configureAdminPlacementTilePicker(false);
        gameState = await fetchGameState(gameId);
        syncWinnerOverlayFromState(gameState);
        currentPhase = gameState.phase;

        const players = gameState.players || [];
        const ownPlayer = findOwnPlayer(players);
        setPanelTitle(ownPlayer?.name || "");
        const ownPlayerId = client.getPlayerId();
        const ownPlayers = ownPlayerId ? players.filter((player) => player.id === ownPlayerId) : [];
        const canSpectateAllAiStacks = canViewAllAiStacks(players, ownPlayerId);
        const visiblePlayers = canSpectateAllAiStacks ? players : ownPlayers;
        renderAssignedTowerMarkers(players);
        const playerById = new Map(players.map((player) => [player.id, player]));
        const activePlayer = playerById.get(gameState.activePlayer);
        const isOwnTurn = !!ownPlayerId && gameState.activePlayer === ownPlayerId;
        const movedLegionIds = new Set(gameState.movedLegionsThisTurn || []);

        const legions = visiblePlayers.flatMap((player) =>
          (player.legions || []).map((legion) => ({
            player,
            legion,
          }))
        );

        // Get terrain for each legion's tile
        const getTerrain = (tileId) => terrainByNumber.get(tileId) || "plains";
        const getEligibleRecruits = (legion) => {
          if (!movedLegionIds.has(legion.id)) {
            return [];
          }
          if ((legion.creatures || []).length >= 7) {
            return [];
          }

          const terrain = getTerrain(legion.tile);
          const chain = recruitmentByTerrain[terrain] || [];
          const counts = new Map();
          for (const creature of legion.creatures || []) {
            counts.set(creature.type, (counts.get(creature.type) || 0) + 1);
          }

          const eligible = new Set();
          for (let i = 0; i < chain.length; i += 1) {
            const step = chain[i];
            const count = counts.get(step.type) || 0;

            if (count >= 1) {
              eligible.add(step.type);
            }
            if (step.promoteAt !== undefined && count >= step.promoteAt && i + 1 < chain.length) {
              eligible.add(chain[i + 1].type);
            }
          }

          // Special Tower recruitment: Guardian if legion has 3+ of any one creature type.
          if (terrain === "tower") {
            eligible.add("CENTAUR");
            eligible.add("GARGOYLE");
            eligible.add("OGRE");

            for (const count of counts.values()) {
              if (count >= 3) {
                eligible.add("GUARDIAN");
                break;
              }
            }

            if ((counts.get("TITAN") || 0) >= 1) {
              eligible.add("WARLOCK");
            }
          }

          return Array.from(eligible);
        };

        panelContent.innerHTML = `${renderTabs()}
          <div class="panel-section">
            <h3>Recruit Phase</h3>
            <div class="status info">
              Active player: <strong>${activePlayer ? activePlayer.name : "Unknown"}</strong><br/>
              ${isOwnTurn ? "It is your turn. Recruit one creature per stack (or skip)." : "Waiting for the active player."}
            </div>

            <div class="panel-section" style="margin-top:1rem; padding:0.8rem;">
              <h3 style="margin:0 0 0.6rem;">${canSpectateAllAiStacks ? "All Stacks (AI Spectator)" : "Your Stacks"}</h3>
              ${legions.length === 0 ? `
                <p style="margin:0;color:#9f8b67;">No stacks found.</p>
              ` : legions.map(({ player, legion }) => {
                const terrain = getTerrain(legion.tile);
                const recruitables = getEligibleRecruits(legion);
                const hasMoved = movedLegionIds.has(legion.id);
                const stackFull = (legion.creatures || []).length >= 7;
                return `
                <div style="border:1px solid #5d4a2e;border-radius:6px;padding:0.65rem;margin-bottom:0.55rem;background:rgba(0,0,0,0.2);">
                  <div style="font-size:0.82rem; color:#d2b88e;"><strong>${player.name}</strong> (${player.color})</div>
                  <div style="font-size:0.8rem; margin-top:0.2rem;">Stack Number: <strong>${getStackNumber(legion)}</strong></div>
                  <div style="font-size:0.8rem; margin-top:0.2rem;">Tile: <strong>${legion.tile}</strong> (${terrain})</div>
                  <div style="font-size:0.8rem; margin-top:0.25rem; color:#f0e7cf;">Creatures: ${describeCreatures(legion.creatures)}</div>
                  ${isOwnTurn ? `
                    <div style="margin-top:0.5rem;">
                      <div style="font-size:0.75rem; color:#d2b88e; margin-bottom:0.3rem;">Recruit:</div>
                      ${!hasMoved ? `<div style="font-size:0.75rem; color:#bfa884; margin-bottom:0.35rem;">Must move to a new tile to recruit.</div>` : ""}
                      ${stackFull ? `<div style="font-size:0.75rem; color:#bfa884; margin-bottom:0.35rem;">Stack is full (7 creatures max).</div>` : ""}
                      <div style="display:flex;flex-wrap:wrap;gap:0.3rem;">
                        ${recruitables.map((creatureType) => `
                          <button class="recruit-btn" data-legion-id="${legion.id}" data-creature-type="${creatureType}" 
                            style="padding:0.3rem 0.5rem;font-size:0.75rem;background:#5d4a2e;border:1px solid #7a6c4f;border-radius:3px;color:#f0e7cf;cursor:pointer;">
                            ${creatureType.charAt(0) + creatureType.slice(1).toLowerCase()}
                          </button>
                        `).join("")}
                        ${recruitables.length === 0 ? `<span style="color:#9f8b67;font-size:0.75rem;">No legal recruits</span>` : ""}
                      </div>
                    </div>
                  ` : ""}
                </div>
              `}).join("")}
            </div>

            <button id="btn-end-recruit" class="primary" style="margin-top:1rem;" ${isOwnTurn ? "" : "disabled"}>End Recruit Phase</button>
            ${renderStackPlacementAdminSection(players)}
          </div>
        `;

        bindTabActions();

        // Attach event listeners to recruit buttons
        document.querySelectorAll(".recruit-btn").forEach((btn) => {
          btn.addEventListener("click", async (e) => {
            const legionId = btn.getAttribute("data-legion-id");
            const creatureType = btn.getAttribute("data-creature-type");
            if (!legionId || !creatureType) return;

            try {
              await client.recruitCreature(gameId, legionId, creatureType);
              await showRecruitPhase(gameId);
            } catch (error) {
              showError("Error recruiting creature: " + (error.message || error));
            }
          });
        });

        document.getElementById("btn-end-recruit")?.addEventListener("click", async () => {
          if (!ownPlayerId) {
            showError("No active player is registered for this client.");
            return;
          }
          try {
            await client.endPhase(gameId, ownPlayerId);
          } catch (error) {
            showError(error.message);
          }
        });

        bindAdminStackPlacementControls(true);
      }

      function showStatus(message, type = "info") {
        const status = document.createElement("div");
        status.className = `status ${type}`;
        status.textContent = message;
        panelContent.insertBefore(status, panelContent.firstChild);
        setTimeout(() => status.remove(), 5000);
      }

      function showError(message) {
        showStatus("Error: " + message, "error");
      }

      const LOG_LABELS = {
        GAME_CREATED:  "Game created",
        PLAYER_JOINED: "Player joined",
        GAME_STARTED:  "Game started",
        TOWER_ASSIGNED:"Tower assigned",
        SETUP_COMPLETE:"Setup complete",
        LEGION_SPLIT:  "Legion split",
        LEGION_MOVED:  "Legion moved",
        CREATURE_RECRUITED: "Creature recruited",
        PHASE_ENDED:   "Phase ended",
      };

      function ensureLogPanel() {
        let logPanel = document.getElementById("log-panel");
        if (!logPanel) {
          logPanel = document.createElement("div");
          logPanel.id = "log-panel";
          logPanel.className = "panel-section log-panel";
          logPanel.innerHTML = `
            <h3>Game Log</h3>
            <ol id="log-list" class="log-list"></ol>
          `;
          panelContent.appendChild(logPanel);
        }
        return document.getElementById("log-list");
      }

      function appendLogEntry(entry) {
        const list = ensureLogPanel();
        const item = document.createElement("li");
        item.className = "log-item";
        const time = new Date(entry.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
        const label = LOG_LABELS[entry.action] ?? entry.action;
        const detailStr = Object.entries(entry.details)
          .filter(([k]) => k !== "setupComplete")
          .map(([k, v]) => `${k}: ${v}`).join(", ");
        item.innerHTML = `
          <span class="log-time">${time}</span>
          <span class="log-action">${label}</span>
          ${detailStr ? `<span class="log-detail">${detailStr}</span>` : ""}
        `;
        list.appendChild(item);
        list.scrollTop = list.scrollHeight;
      }

      // Initialize
      window.addEventListener("load", async () => {
        await initializeGame();

        // Apply ?battle= and/or ?stacks= after all init paths (including early
        // returns from rejoin/invite) have completed.
        const qs = new URLSearchParams(window.location.search);
        const stacksParam = qs.get("stacks");
        const battleParam = (qs.get("battle") || "").toUpperCase();

        if (battleParam && BATTLE_TERRAINS.includes(battleParam)) {
          battlePreviewTerrain = battleParam;
          isAdminMode = true;
          activeTab = "battle";
          await showBattleBoard();
          if (stacksParam) applyTestStacks(stacksParam);
        } else if (stacksParam) {
          // Give the world board SVG a tick to mount.
          setTimeout(() => applyTestStacks(stacksParam), 100);
        }
      });
      client.on("server:log-entry", appendLogEntry);
    </script>
  </body>
</html>
